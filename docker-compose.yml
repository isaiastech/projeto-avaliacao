services:
  db:
    image: mysql:8.0
    container_name: mysql_avaliacao
    restart: always
    environment:
      MYSQL_DATABASE: sistema_avaliacao
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_avaliacao
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

  web:
    build: .
    container_name: sistema_avaliacao_web
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www/html
      - ./config:/var/www/config
    depends_on:
      - db

volumes:
  mysql_data: